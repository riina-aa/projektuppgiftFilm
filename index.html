<!doctype html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link rel="stylesheet" href="/src/scss/main.scss">
  <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined" rel="stylesheet" />
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link
    href="https://fonts.googleapis.com/css2?family=Poppins:ital,wght@0,400;0,500;0,600;0,700;0,800;0,900;1,400;1,500;1,600;1,700;1,800;1,900&display=swap"
    rel="stylesheet">
  <title>projektuppgift</title>
</head>

<body>
  <div id="logo"><a href="index.html"><img src="/public/images/logo.png" alt=""></a></div>
  <header></header>
  <nav>
    <label for="search">
      <span>Vad vill du titta på idag?</span>
      <span class="material-symbols-outlined">arrow_forward</span>
    </label>
    <div>
      <input type="text" id="search">
      <span id="search-icon" class="material-symbols-outlined">search</span>
    </div>

    <div class="watchlist">
      <span class="material-symbols-outlined">bookmark_star</span>
      <a href="watchlist.html">Watchlist</a>
    </div>
  </nav>

  <section class="search-container">
    <h1>Dina sökresultat:</h1>
    <div class="search-results movie-cards"></div>
    <a class="backBtn" href="index.html">
      <span class="closeIcon material-symbols-outlined">arrow_back</span>
      <span>Gå tillbaka till utforskaren</span>
    </a>
  </section>


  <section class="movie-section">
    <h2>Populäraste filmerna just nu</h2>
    <div id="popular" class="movie-cards"></div>
  </section>

  <section class="movie-section">
    <h2>Filmer till kvällsmyset</h2>
    <div id="cozy" class="movie-cards"></div>
  </section>

  <section class="movie-section">
    <h2>Adrenalin på hög nivå</h2>
    <div id="action" class="movie-cards"></div>
  </section>

  <section id="watchlist-section" class="movie-section">
    <h2>Från din watchlist</h2>
    <div id="display-watchlist" class="movie-cards"></div>
  </section>

  <section class="movie-section">
    <h2>Drama drama drama...</h2>
    <div id="drama" class="movie-cards"></div>
  </section>

  <div class="modal">
    <div class="modal-content"></div>
  </div>

  <script type="module" src="/src/js/main.js"></script>
</body>

</html>
