<!doctype html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="/src/scss/main.scss">
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined" rel="stylesheet" />
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Poppins:ital,wght@0,400;0,500;0,600;0,700;0,800;0,900;1,400;1,500;1,600;1,700;1,800;1,900&display=swap"
        rel="stylesheet">
    <title>projektuppgift</title>
</head>

<body>
      <nav class="nav">
    <div id="logo">
      <a class="logo-link" href="index.html">
        <img src="/public/images/logo.png" alt="">
      </a>
    </div>
    <div class="menu">
      <label for="search">Sök:</label>
      <div class="input-container">
        <input type="text" id="search">
        <span id="search-icon" class="material-symbols-outlined">search</span>
      </div>
      <div class="watchlist">
        <span class="material-symbols-outlined">bookmark</span>
        <a href="watchlist.html">Watchlist</a>
      </div>
      <div class="mode-toggle-container">
        <div class="mode-toggle">
          <span class="material-symbols-outlined mode-icon">dark_mode</span>
          <span class="material-symbols-outlined mode-icon">light_mode</span>
          <div class="toggle-ball"></div>
        </div>
      </div>
    </div>
  </nav>

    <section class="container">
        <h1>Filmer i din Watchlist:</h1>
        <div id="saved-movies" class="movie-cards"></div>
        <a class="backBtn" href="index.html">
            <span class="closeIcon material-symbols-outlined">arrow_back</span>
            <span>Gå tillbaka till utforskaren</span>
        </a>
    </section>

    <div class="modal">
        <span class="closeIcon material-symbols-outlined">close</span>
        <div class="modal-content"></div>
    </div>

    <script type="module" src="/src/js/watchlist.js"></script>
</body>

</html>
